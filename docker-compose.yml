x-airflow-common: &airflow-common
  build:
    context: ./containers/airflow/
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-metadata/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__WEBSERVER__SECRET_KEY: local-dev-secret-key
    PYTHONPATH: /opt/airflow/dags
    DBT_PROFILES_DIR: /opt/airflow/dbt
    WAREHOUSE_HOST: warehouse
    WAREHOUSE_PORT: "5432"
    WAREHOUSE_USER: ${WAREHOUSE_USER:-olist}
    WAREHOUSE_PASSWORD: ${WAREHOUSE_PASSWORD:-olist_local_dev}
    WAREHOUSE_DB: ${WAREHOUSE_DB:-olist}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./dbt:/opt/airflow/dbt
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    airflow-metadata:
      condition: service_healthy
    warehouse:
      condition: service_healthy

services:
  # Airflow metadata DB.
  airflow-metadata:
    image: postgres:15
    container_name: olist-airflow-metadata
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    volumes:
      - airflow-metadata-data:/var/lib/postgresql/data
    restart: unless-stopped

  # Analytical warehouse — Postgres standing in for "the data warehouse".
  warehouse:
    image: postgres:15
    container_name: olist-warehouse
    environment:
      POSTGRES_USER: ${WAREHOUSE_USER:-olist}
      POSTGRES_PASSWORD: ${WAREHOUSE_PASSWORD:-olist_local_dev}
      POSTGRES_DB: ${WAREHOUSE_DB:-olist}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${WAREHOUSE_USER:-olist}"]
      interval: 5s
      retries: 10
    ports:
      - "5433:5432"
    volumes:
      - warehouse-data:/var/lib/postgresql/data
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    container_name: olist-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname admin --lastname user \
          --role Admin --email admin@example.com || true

  airflow-webserver:
    <<: *airflow-common
    container_name: olist-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: olist-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  metabase:
    image: metabase/metabase:latest
    container_name: olist-metabase
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  airflow-metadata-data:
  warehouse-data:
